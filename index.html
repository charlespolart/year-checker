<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>Reading Tracker 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=DotGothic16&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  @media (pointer: fine) {
    * { cursor: none !important; }
  }

  #customCursor {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 36px;
    height: 36px;
    pointer-events: none;
    z-index: 99999;
    transform: translate(-50%, -50%);
  }

  body {
    font-family: 'Silkscreen', 'DotGothic16', monospace;
    background: #f5f0d0;
    background-image: radial-gradient(circle, #b8c0d8 2px, transparent 2px);
    background-size: 32px 32px;
    min-height: 100vh;
    color: #6a6880;
    overflow-x: hidden;
  }

  /* ══════════════════════════════════════
     PAGE LAYOUT
     ══════════════════════════════════════ */
  .page-layout {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 12px;
    gap: 16px;
  }

  /* Default stacked order: book, title, tabs */
  .tama-shell { order: 0; }
  .header-block { order: 1; }
  .page-tabs { order: 2; }

  /* ── Tabs (horizontal top by default) ── */
  .page-tabs {
    display: grid;
    grid-template-columns: repeat(3, auto);
    gap: 6px;
    justify-content: center;
    width: 100%;
  }

  .page-tab {
    font-family: 'Silkscreen', monospace;
    font-size: 0.7rem;
    letter-spacing: 1px;
    padding: 8px 16px;
    border-radius: 10px 10px 0 0;
    border: 2px solid #c8c0a8;
    border-bottom: none;
    background: #ede8d4;
    color: #9890a0;
    cursor: none !important;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .page-tab:hover { background: #f5f0e0; transform: translateY(-2px); }

  .page-tab.active {
    background: #faf6e8;
    color: #8080a8;
    border-color: #a8a0c0;
    box-shadow: 0 2px 0 #faf6e8;
    z-index: 1;
  }

  .page-tab .tab-close { font-size: 12px; opacity: 0.4; transition: opacity 0.15s; }
  .page-tab .tab-close:hover { opacity: 1; }

  .page-tab-add {
    font-family: 'Silkscreen', monospace;
    font-size: 0.85rem;
    padding: 7px 14px;
    border-radius: 10px 10px 0 0;
    border: 2px dashed #c8c0a8;
    border-bottom: none;
    background: transparent;
    color: #b0a890;
    cursor: none !important;
    transition: all 0.15s;
  }
  .page-tab-add:hover { background: #ede8d4; transform: translateY(-2px); }

  /* ── Header (title, subtitle, stars) ── */
  .header-block {
    text-align: center;
    width: 100%;
    min-width: 0;
  }

  .page-title {
    font-family: 'Silkscreen', monospace;
    font-size: 1.6rem;
    color: #9090b0;
    text-align: center;
    margin-bottom: 2px;
    text-shadow: 2px 2px 0 #d0d0e0;
    letter-spacing: 2px;
    background: none;
    border: none;
    border-bottom: 3px dashed transparent;
    outline: none;
    cursor: none !important;
    width: 100%;
    overflow-wrap: normal;
    word-break: keep-all;
    transition: border-color 0.2s;
  }
  .page-title:hover, .page-title:focus { border-bottom-color: #c8c0d8; }

  .subtitle {
    font-family: 'DotGothic16', monospace;
    font-size: 1rem;
    color: #b0a890;
    text-align: center;
    margin-bottom: 4px;
    letter-spacing: 4px;
  }

  .stars-deco {
    text-align: center;
    font-size: 1rem;
    color: #c8b8a0;
    letter-spacing: 6px;
    animation: twinkle 1.5s ease-in-out infinite alternate;
  }

  @keyframes twinkle {
    0% { opacity: 0.6; }
    100% { opacity: 1; }
  }

  /* ── Book shell ── */
  .tama-shell {
    position: relative;
    background: linear-gradient(135deg, #faf5ea 0%, #f3ecdb 50%, #ede5d0 100%);
    border-radius: 4px 16px 16px 4px;
    padding: 12px 10px 10px 28px;
    width: fit-content;
    max-width: 100%;
    max-height: calc(100vh - 24px);
    max-height: calc(100dvh - 24px);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    box-shadow:
      -3px 0 0 #e8dcc6,
      -5px 0 0 #ddd0b8,
      2px 3px 10px rgba(0,0,0,0.08);
    border: 1px solid #d8cdb5;
  }

  .tama-shell::before {
    content: '';
    position: absolute;
    left: 18px;
    top: 10px;
    bottom: 10px;
    width: 2px;
    background: linear-gradient(to bottom, transparent, #d0c4a8 15%, #c8bca0 50%, #d0c4a8 85%, transparent);
    border-radius: 1px;
  }

  .tama-shell::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 4px 16px 16px 4px;
    background: repeating-linear-gradient(to bottom, transparent, transparent 28px, rgba(200, 190, 168, 0.08) 28px, rgba(200, 190, 168, 0.08) 29px);
    pointer-events: none;
  }

  .tama-buttons, .lace-edge, .book-spine { display: none; }

  /* ── Screen ── */
  .screen {
    background: rgba(255,255,252,0.6);
    border: 2px dashed #d0c8b0;
    border-radius: 14px;
    padding: 10px;
    width: 100%;
    flex: 1;
    overflow: hidden;
  }

  .screen-dark {
    background: rgba(232,228,216,0.5);
    border-color: #c8c0a0;
    color: #7a7868;
    flex: none;
    width: fit-content;
  }

  .section-title {
    font-family: 'Silkscreen', monospace;
    font-size: 0.75rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 6px;
    padding-bottom: 4px;
    border-bottom: 2px dashed #c8c0a8;
    color: #a09880;
  }

  /* ── Tracker layout (sidebar + grid) ── */
  .tracker-layout {
    display: flex;
    gap: 16px;
    align-items: stretch;
    width: 100%;
  }

  .sidebar {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 6px;
    width: 160px;
    padding: 0 8px;
  }

  .sidebar-section-title {
    font-family: 'Silkscreen', monospace;
    font-size: 0.65rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-align: center;
    padding-bottom: 4px;
    border-bottom: 2px dashed #c8c0a8;
    color: #a09880;
    opacity: 0.7;
  }

  /* ── Color Picker ── */
  .color-options {
    display: grid;
    grid-template-columns: repeat(5, 24px);
    gap: 4px;
    justify-content: center;
  }

  .eraser-row {
    display: flex;
    justify-content: center;
    margin-bottom: 2px;
  }

  .color-btn {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 2px solid #c8c0a8;
    cursor: none !important;
    transition: all 0.15s;
  }

  .color-btn:hover { transform: scale(1.2); border-color: #a8a0c0; box-shadow: 0 0 6px rgba(160, 150, 190, 0.4); }
  .color-btn.active { border-color: #8880a8; box-shadow: 0 0 0 3px rgba(136, 128, 168, 0.3); transform: scale(1.15); }

  .color-btn.eraser {
    background: #f5f0d0 !important;
    border: 2px dashed #c8c0a8;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-family: 'Silkscreen', monospace;
    color: #a09880;
  }
  .color-btn.eraser.active { border-color: #8880a8; border-style: dashed; box-shadow: 0 0 0 3px rgba(136, 128, 168, 0.3); }

  /* ── Legend ── */
  .legend-items { display: flex; flex-direction: column; gap: 3px; }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.7rem;
    font-family: 'DotGothic16', monospace;
    color: #8a8478;
    cursor: grab !important;
    padding: 3px 5px;
    border-radius: 6px;
    transition: background 0.15s;
  }
  .legend-item:hover { background: rgba(0,0,0,0.04); }
  .legend-item.dragging { opacity: 0.4; }
  .legend-item.drag-over { border-top: 2px solid #a8a0c0; }

  .legend-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 2px solid rgba(0,0,0,0.08);
    flex-shrink: 0;
  }

  /* ── Sidebar Stats ── */
  .sidebar-stats {
    display: flex;
    gap: 8px;
    justify-content: center;
  }

  .sidebar-stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1px;
  }

  .sidebar-stat-value {
    font-family: 'Silkscreen', monospace;
    font-size: 1.1rem;
    color: #8a8478;
  }

  .sidebar-stat-label {
    font-family: 'DotGothic16', monospace;
    font-size: 0.7rem;
    color: #9890a0;
    letter-spacing: 1px;
  }

  .legend-input-row { display: flex; flex-direction: column; gap: 4px; }

  .legend-input-row input {
    font-family: 'DotGothic16', monospace;
    font-size: 0.75rem;
    border: 2px solid #c8c0a8;
    border-radius: 8px;
    padding: 5px 7px;
    background: #faf6e8;
    color: #7a7868;
    outline: none;
    width: 100%;
  }

  /* ── Buttons ── */
  .btn {
    font-family: 'Silkscreen', monospace;
    font-size: 0.65rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    border: 2px solid;
    border-radius: 10px;
    padding: 7px 14px;
    cursor: none !important;
    transition: all 0.15s;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 2px 2px 0 rgba(0,0,0,0.08); }
  .btn:active { transform: translateY(0); box-shadow: none; }
  .btn-add { background: #d8e8c8; border-color: #b0c8a0; color: #708060; }
  .btn-reset { background: #e8d0c8; border-color: #c8b0a8; color: #907870; }

  /* ── Tracker Grid ── */
  .tracker-scroll { overflow-x: auto; overflow-y: hidden; padding-bottom: 4px; max-width: 100%; }

  .tracker-table {
    border-collapse: separate;
    border-spacing: var(--dot-spacing-h, 3px) var(--dot-spacing-v, 2px);
    margin: 0;
  }

  .tracker-table th {
    font-family: 'Silkscreen', monospace;
    font-size: var(--label-size, 0.6rem);
    color: #9890a0;
    padding: 0 1px 4px;
    text-align: center;
    letter-spacing: 1px;
  }
  .tracker-table th.day-header { padding-right: 6px; text-align: right; }

  .tracker-table td.day-label {
    text-align: right;
    padding-right: 6px;
    font-family: 'Silkscreen', monospace;
    font-size: var(--label-size, 0.55rem);
    color: #a09880;
    white-space: nowrap;
  }

  .dot-cell { padding: 0; }

  .dot {
    width: var(--dot-size, 16px);
    height: var(--dot-size, 16px);
    border-radius: 50%;
    background: #efe8d0;
    border: 2px solid #d0c8b0;
    cursor: none !important;
    transition: all 0.15s;
  }
  .dot:hover { transform: scale(1.25); box-shadow: 0 0 8px rgba(160, 150, 190, 0.4); border-color: #a8a0c0; }
  .dot.filled { border-color: rgba(0, 0, 0, 0.08); }


  /* ══════════════════════════════════════
     RESPONSIVE - MOBILE (default, < 768px)
     Portrait: stacked, book is priority
     ══════════════════════════════════════ */
  @media (max-width: 767px) {
    .page-layout { padding: 8px; gap: 10px; }
    .tama-shell { order: 0; padding: 8px 8px 8px 22px; }
    .tama-shell::before { left: 14px; }
    .header-block { order: 1; }
    .page-tabs { order: 2; }
    .page-title { font-size: 1.3rem; }
    .subtitle { font-size: 0.85rem; }
    .stars-deco { font-size: 0.85rem; }

    /* Sidebar becomes horizontal above grid */
    .tracker-layout { flex-direction: column; gap: 8px; }
    .sidebar {
      width: 100%;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 0;
    }
    .sidebar > .sidebar-section-title { width: 100%; }
    .color-options { grid-template-columns: repeat(5, 22px); justify-content: center; }
    .color-btn { width: 22px; height: 22px; }
    .sidebar-stats { justify-content: center; }
    .legend-items { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; }
    .legend-input-row { width: 100%; }
    .screen { padding: 8px; overflow-y: auto; }
  }

  /* Phone landscape */
  @media (max-width: 767px) and (orientation: landscape) {
    .header-block { display: flex; gap: 12px; align-items: center; justify-content: center; flex-wrap: wrap; }
    .page-title { font-size: 1.1rem; margin-bottom: 0; }
    .subtitle { margin-bottom: 0; font-size: 0.8rem; }
    .stars-deco { display: none; }
    .tracker-layout { flex-direction: row; gap: 10px; }
    .sidebar { width: 130px; flex-direction: column; padding: 0 6px; }
    .color-options { grid-template-columns: repeat(5, 20px); gap: 3px; }
    .color-btn { width: 20px; height: 20px; }
  }

  /* ══════════════════════════════════════
     TABLET (768px - 1199px)
     ══════════════════════════════════════ */
  @media (min-width: 768px) and (max-width: 1399px) {
    .page-layout { padding: 16px; gap: 14px; }
    .page-title { font-size: 2rem; }
    .subtitle { font-size: 1.2rem; }
    .stars-deco { font-size: 1.2rem; }
    .tama-shell { padding: 14px 12px 12px 30px; }
  }

  /* Tablet landscape: book left, tabs + info right */
  @media (min-width: 1100px) and (max-width: 1399px) and (orientation: landscape) {
    .page-layout {
      display: grid;
      grid-template-columns: auto auto;
      grid-template-rows: auto 1fr;
      gap: 12px 24px;
      align-items: start;
      justify-content: center;
      align-content: center;
      padding: 12px 20px;
    }
    .tama-shell { grid-column: 2; grid-row: 1 / -1; align-self: center; justify-self: center; order: 0; }
    .page-tabs { grid-column: 1; grid-row: 1; justify-self: center; order: 0; }
    .header-block { grid-column: 1; grid-row: 2; align-self: center; justify-self: center; max-width: 280px; order: 0; }
    .page-title { font-size: 2.2rem; }
  }

  /* ══════════════════════════════════════
     DESKTOP (>= 1400px)
     Book left, tabs + info right
     ══════════════════════════════════════ */
  @media (min-width: 1400px) {
    .page-layout {
      display: grid;
      grid-template-columns: auto auto;
      grid-template-rows: auto 1fr;
      min-height: 100vh;
      padding: 16px 40px;
      gap: 12px 30px;
      justify-content: center;
      align-content: center;
    }

    .tama-shell {
      grid-column: 2;
      grid-row: 1 / -1;
      align-self: center;
      justify-self: center;
      height: calc(100vh - 32px);
      order: 0;
    }

    .page-tabs {
      grid-column: 1;
      grid-row: 1;
      justify-self: center;
      order: 0;
    }

    .header-block {
      grid-column: 1;
      grid-row: 2;
      align-self: center;
      justify-self: center;
      max-width: 350px;
      order: 0;
    }

    .page-title { font-size: 3.5rem; }
    .subtitle { font-size: 1.8rem; margin-bottom: 16px; }
    .stars-deco { font-size: 1.6rem; margin-bottom: 16px; }
  }

  /* Large desktop */
  @media (min-width: 1700px) {
    .page-layout { gap: 0 50px; padding: 16px 60px; }
    .page-title { font-size: 4rem; }
    .subtitle { font-size: 2rem; }
    .stars-deco { font-size: 2rem; }
    .tama-shell { padding: 14px 16px 12px 36px; }
    .sidebar { width: 180px; }
    .color-options { grid-template-columns: repeat(5, 28px); gap: 5px; }
    .color-btn { width: 28px; height: 28px; }
  }
</style>
</head>
<body>

<img id="customCursor" src="cursor.gif" alt="">

<div class="page-layout">

  <div class="page-tabs" id="pageTabs"></div>

  <div class="header-block">
    <div class="page-title" id="pageTitle" contenteditable="true" spellcheck="false">Reading Tracker</div>
    <p class="subtitle">~ 2026 ~</p>
    <div class="stars-deco">&#9734; &#9734; &#9734; &#9734; &#9734;</div>
  </div>


  <div class="tama-shell">
    <div class="screen">
      <div class="section-title" id="bookTitle">Tracker</div>
      <div class="tracker-layout">
        <div class="sidebar">
          <div class="sidebar-section-title">Couleurs</div>
          <div class="eraser-row" id="eraserRow"></div>
          <div class="color-options" id="colorPicker"></div>
          <div class="sidebar-section-title">Legende</div>
          <div class="legend-items" id="legendItems"></div>
          <div class="legend-input-row">
            <input type="text" id="newLegendLabel" placeholder="ex: 1-5 pages">
            <button class="btn btn-add" onclick="addLegend()">+ Add</button>
          </div>
          <div class="sidebar-section-title" style="margin-top:auto;">Stats</div>
          <div class="sidebar-stats">
            <div class="sidebar-stat">
              <span class="sidebar-stat-value" id="statFilled">0</span>
              <span class="sidebar-stat-label">jours</span>
            </div>
            <div class="sidebar-stat">
              <span class="sidebar-stat-value" id="statStreak">0</span>
              <span class="sidebar-stat-label">serie</span>
            </div>
            <div class="sidebar-stat">
              <span class="sidebar-stat-value" id="statPercent">0%</span>
              <span class="sidebar-stat-label">annee</span>
            </div>
          </div>
          <button class="btn btn-reset" onclick="resetAll()" style="margin-top:6px;width:100%;">Tout effacer</button>
        </div>
        <div class="tracker-scroll">
          <table class="tracker-table" id="trackerGrid"></table>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
const MONTHS = ['J','F','M','A','M','J','J','A','S','O','N','D'];
const DAYS_IN_MONTH = [31,28,31,30,31,30,31,31,30,31,30,31];
const YEAR = 2026;

const PALETTE = [
  '#FFE5EC','#FFC2D1','#FF9EB8','#FF7AA0','#FF5C8A',
  '#FFE8D6','#FFD1B0','#FFBA8A','#FFA364','#FF8C42',
  '#FFF9DB','#FFF3BF','#FFEC99','#FFE066','#FFD43B',
  '#E6F4EA','#C7E9C0','#A8D8A8','#7BC47F','#4CAF50',
  '#E7F5FF','#D0EBFF','#A5D8FF','#74C0FC','#4DABF7',
  '#F3F0FF','#E5DBFF','#D0BFFF','#B197FC','#9775FA',
  '#F8F8F8','#DADADA','#B0B0B0','#7F7F7F','#3C3C3C',
];

let pages = [];
let currentPageId = null;
let selectedColor = PALETTE[0];
let saveTimeout = null;

async function loadPages() {
  try {
    const res = await fetch('/api/pages');
    const data = await res.json();
    pages = Array.isArray(data) && data.length > 0 ? data : [];
  } catch { pages = []; }
  if (pages.length === 0) { pages.push(createPage('Reading Tracker')); savePages(); }
  if (!currentPageId) currentPageId = pages[0].id;
}

function savePages() {
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(() => {
    fetch('/api/pages', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(pages) });
  }, 300);
}

function createPage(title) {
  return { id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6), title, data: {}, legends: [] };
}

function currentPage() { return pages.find(p => p.id === currentPageId) || pages[0]; }

async function init() { await loadPages(); renderAll(); }

function renderAll() { renderTabs(); renderTitle(); renderPicker(); renderGrid(); renderLegend(); updateStats(); }

/* ── Tabs ── */
function renderTabs() {
  const c = document.getElementById('pageTabs');
  c.innerHTML = '';
  pages.forEach(page => {
    const tab = document.createElement('button');
    tab.className = 'page-tab' + (page.id === currentPageId ? ' active' : '');
    const name = document.createElement('span');
    name.textContent = page.title;
    tab.appendChild(name);
    if (pages.length > 1) {
      const close = document.createElement('span');
      close.className = 'tab-close';
      close.textContent = 'x';
      close.onclick = (e) => { e.stopPropagation(); deletePage(page.id); };
      tab.appendChild(close);
    }
    tab.onclick = () => switchPage(page.id);
    c.appendChild(tab);
  });
  const addBtn = document.createElement('button');
  addBtn.className = 'page-tab-add';
  addBtn.textContent = '+';
  addBtn.title = 'Nouvelle page';
  addBtn.onclick = addPage;
  c.appendChild(addBtn);
}

function switchPage(id) { currentPageId = id; selectedColor = PALETTE[0]; renderAll(); }

function addPage() {
  const page = createPage('Nouveau Tracker');
  pages.push(page);
  currentPageId = page.id;
  savePages();
  renderAll();
  document.getElementById('pageTitle').focus();
}

function deletePage(id) {
  if (pages.length <= 1) return;
  if (!confirm('Supprimer cette page ?')) return;
  const idx = pages.findIndex(p => p.id === id);
  pages.splice(idx, 1);
  if (currentPageId === id) currentPageId = pages[Math.min(idx, pages.length - 1)].id;
  savePages();
  renderAll();
}

/* ── Title ── */
function renderTitle() {
  document.getElementById('pageTitle').textContent = currentPage().title;
  document.getElementById('bookTitle').textContent = currentPage().title;
}

document.getElementById('pageTitle').addEventListener('input', function() {
  currentPage().title = this.textContent;
  document.getElementById('bookTitle').textContent = this.textContent;
  savePages();
  renderTabs();
});

/* ── Color Picker ── */
function renderPicker() {
  const eraserRow = document.getElementById('eraserRow');
  eraserRow.innerHTML = '';
  const eraser = document.createElement('button');
  eraser.className = 'color-btn eraser';
  eraser.title = 'Gomme';
  eraser.textContent = 'x';
  eraser.onclick = () => {
    selectedColor = null;
    document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
    eraser.classList.add('active');
  };
  eraserRow.appendChild(eraser);

  const container = document.getElementById('colorPicker');
  container.innerHTML = '';
  PALETTE.forEach(color => {
    const btn = document.createElement('button');
    btn.className = 'color-btn' + (color === selectedColor ? ' active' : '');
    btn.style.background = color;
    btn.onclick = () => {
      selectedColor = color;
      document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    };
    container.appendChild(btn);
  });
}

/* ── Legend ── */
let dragIdx = null;

function renderLegend() {
  const page = currentPage();
  const container = document.getElementById('legendItems');
  container.innerHTML = '';
  page.legends.forEach((item, i) => {
    const div = document.createElement('div');
    div.className = 'legend-item';
    div.draggable = true;
    div.dataset.index = i;
    div.innerHTML = '<span class="legend-dot" style="background:'+item.color+'"></span>'+item.label+
      ' <span style="cursor:pointer;opacity:0.5;font-size:12px;" onclick="removeLegend('+i+')" title="Supprimer">x</span>';
    div.addEventListener('dragstart', () => { dragIdx = i; div.classList.add('dragging'); });
    div.addEventListener('dragend', () => { dragIdx = null; div.classList.remove('dragging'); container.querySelectorAll('.legend-item').forEach(el => el.classList.remove('drag-over')); });
    div.addEventListener('dragover', (e) => { e.preventDefault(); container.querySelectorAll('.legend-item').forEach(el => el.classList.remove('drag-over')); div.classList.add('drag-over'); });
    div.addEventListener('drop', (e) => {
      e.preventDefault();
      if (dragIdx === null || dragIdx === i) return;
      const moved = page.legends.splice(dragIdx, 1)[0];
      page.legends.splice(i, 0, moved);
      savePages();
      renderLegend();
    });
    container.appendChild(div);
  });
}

function addLegend() {
  const input = document.getElementById('newLegendLabel');
  const label = input.value.trim();
  if (!label || !selectedColor) return;
  currentPage().legends.push({ color: selectedColor, label });
  savePages();
  renderLegend();
  input.value = '';
}

function removeLegend(i) { currentPage().legends.splice(i, 1); savePages(); renderLegend(); }

/* ── Grid ── */
function renderGrid() {
  const page = currentPage();
  const table = document.getElementById('trackerGrid');
  table.innerHTML = '';

  const thead = document.createElement('thead');
  const headRow = document.createElement('tr');
  headRow.innerHTML = '<th class="day-header"></th>';
  MONTHS.forEach(m => { headRow.innerHTML += '<th>'+m+'</th>'; });
  thead.appendChild(headRow);
  table.appendChild(thead);

  const tbody = document.createElement('tbody');
  for (let day = 1; day <= 31; day++) {
    const row = document.createElement('tr');
    row.innerHTML = '<td class="day-label">'+day+'</td>';
    for (let month = 0; month < 12; month++) {
      const td = document.createElement('td');
      td.className = 'dot-cell';
      if (day <= DAYS_IN_MONTH[month]) {
        const dot = document.createElement('div');
        dot.className = 'dot';
        const key = month+'-'+day;
        if (page.data[key]) { dot.style.background = page.data[key]; dot.classList.add('filled'); }
        dot.onclick = () => clickDot(dot, key);
        td.appendChild(dot);
      }
      row.appendChild(td);
    }
    tbody.appendChild(row);
  }
  table.appendChild(tbody);
}

function clickDot(dot, key) {
  if (touchMoved) return;
  const page = currentPage();
  if (selectedColor === null) { delete page.data[key]; dot.style.background = '#efe8d0'; dot.classList.remove('filled'); }
  else { page.data[key] = selectedColor; dot.style.background = selectedColor; dot.classList.add('filled'); }
  savePages();
  updateStats();
}

/* ── Stats ── */
function updateStats() {
  const page = currentPage();
  const filled = Object.keys(page.data).length;
  document.getElementById('statFilled').textContent = filled;
  const totalDays = DAYS_IN_MONTH.reduce((a, b) => a + b, 0);
  document.getElementById('statPercent').textContent = Math.round((filled / totalDays) * 100) + '%';
  let best = 0, cur = 0;
  for (let m = 0; m < 12; m++) {
    for (let d = 1; d <= DAYS_IN_MONTH[m]; d++) {
      if (page.data[m+'-'+d]) { cur++; if (cur > best) best = cur; } else { cur = 0; }
    }
  }
  document.getElementById('statStreak').textContent = best;
}

function resetAll() {
  if (!confirm('Effacer cette page ?')) return;
  currentPage().data = {};
  savePages();
  renderGrid();
  updateStats();
}

/* ── Prevent accidental dot clicks while scrolling ── */
let touchMoved = false;
document.addEventListener('touchstart', () => { touchMoved = false; }, { passive: true });
document.addEventListener('touchmove', () => { touchMoved = true; }, { passive: true });

init();

/* ── Responsive dot sizing ── */
function resizeDots() {
  const shell = document.querySelector('.tama-shell');
  const screen = document.querySelector('.screen');
  const shellStyle = getComputedStyle(shell);
  const screenStyle = getComputedStyle(screen);

  // Shell max-height is 100dvh - 24px
  const maxShellH = window.innerHeight - 24;

  // Vertical overhead: shell padding/border + screen padding/border + section title + table header
  const vOverhead =
    parseFloat(shellStyle.paddingTop) + parseFloat(shellStyle.paddingBottom) +
    parseFloat(shellStyle.borderTopWidth) + parseFloat(shellStyle.borderBottomWidth) +
    parseFloat(screenStyle.paddingTop) + parseFloat(screenStyle.paddingBottom) +
    parseFloat(screenStyle.borderTopWidth) + parseFloat(screenStyle.borderBottomWidth) +
    (parseFloat(shellStyle.gap) || 8) +
    30 + 20; // section title ~30px, table header row ~20px

  const spacingV = 2;
  const spacingH = 3;
  const availH = maxShellH - vOverhead;
  const dotFromH = Math.floor((availH - 32 * spacingV) / 31);

  // Width
  const trackerLayout = document.querySelector('.tracker-layout');
  const isRow = getComputedStyle(trackerLayout).flexDirection === 'row';
  const sidebar = document.querySelector('.sidebar');
  const sidebarW = isRow ? (sidebar?.offsetWidth || 0) : 0;
  const tlGap = isRow ? 16 : 0;
  const pageStyle = getComputedStyle(document.querySelector('.page-layout'));
  const pagePadH = parseFloat(pageStyle.paddingLeft) + parseFloat(pageStyle.paddingRight);

  const hOverhead =
    parseFloat(shellStyle.paddingLeft) + parseFloat(shellStyle.paddingRight) +
    parseFloat(shellStyle.borderLeftWidth) + parseFloat(shellStyle.borderRightWidth) +
    parseFloat(screenStyle.paddingLeft) + parseFloat(screenStyle.paddingRight) +
    parseFloat(screenStyle.borderLeftWidth) + parseFloat(screenStyle.borderRightWidth) +
    sidebarW + tlGap + 24 + pagePadH; // 24 = day label column

  const availW = window.innerWidth - hOverhead;
  const dotFromW = Math.floor((availW - 13 * spacingH) / 12);

  // On mobile (sidebar stacked above grid), screen scrolls so ignore height constraint
  const scrollable = getComputedStyle(screen).overflowY === 'auto';
  const dotSize = Math.max(8, Math.min(scrollable ? dotFromW : Math.min(dotFromH, dotFromW), 32));

  document.documentElement.style.setProperty('--dot-size', dotSize + 'px');
  document.documentElement.style.setProperty('--dot-spacing-h', spacingH + 'px');
  document.documentElement.style.setProperty('--dot-spacing-v', spacingV + 'px');
  document.documentElement.style.setProperty('--label-size', (dotSize < 14 ? '0.45rem' : dotSize < 20 ? '0.55rem' : '0.65rem'));
}
resizeDots();
window.addEventListener('resize', resizeDots);

/* ── Custom cursor ── */
const cursorEl = document.getElementById('customCursor');

function updateCursor(x, y) {
  cursorEl.style.left = x + 'px';
  cursorEl.style.top = y + 'px';
  cursorEl.style.transform = 'translate(-50%, -50%)';
}

document.addEventListener('mousemove', e => {
  cursorEl.style.display = '';
  updateCursor(e.pageX, e.pageY);
});

let touchCX = 0, touchCY = 0, touchRAF = null;

function trackTouch() {
  cursorEl.style.left = (touchCX + window.scrollX) + 'px';
  cursorEl.style.top = (touchCY + window.scrollY) + 'px';
  touchRAF = requestAnimationFrame(trackTouch);
}

document.body.addEventListener('touchstart', e => {
  cursorEl.style.display = 'block';
  const t = e.touches[0];
  touchCX = t.clientX;
  touchCY = t.clientY;
  if (!touchRAF) trackTouch();
}, { passive: true, capture: true });

document.body.addEventListener('touchmove', e => {
  const t = e.touches[0];
  touchCX = t.clientX;
  touchCY = t.clientY;
}, { passive: true, capture: true });

document.body.addEventListener('touchend', () => {
  if (touchRAF) { cancelAnimationFrame(touchRAF); touchRAF = null; }
}, { passive: true });

</script>
