<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reading Tracker 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=DotGothic16&display=swap" rel="stylesheet">
<style>
  @font-face {
    font-family: 'Pixel';
    src: local('Silkscreen');
  }

  * { margin: 0; padding: 0; box-sizing: border-box; cursor: none !important; }

  #customCursor {
    position: fixed;
    width: 36px;
    height: 36px;
    pointer-events: none;
    z-index: 99999;
    transform: translate(-50%, -50%);
  }

  body {
    font-family: 'Silkscreen', 'DotGothic16', monospace;
    background: #f5f0d0;
    background-image:
      radial-gradient(circle, #b8c0d8 2px, transparent 2px);
    background-size: 32px 32px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 380px 10px 200px;
    color: #6a6880;
    overflow-x: hidden;
  }

  /* ── Main layout ── */
  .main-layout {
    display: flex;
    gap: 40px;
    align-items: flex-start;
    width: fit-content;
    max-width: 100%;
  }

  .title-side {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: fixed;
    right: 40px;
    top: 50%;
    transform: translateY(-50%);
    max-width: 350px;
    z-index: 100;
  }

  /* ── Screen ── */
  .screen {
    background: rgba(255,255,252,0.6);
    border: 2px dashed #d0c8b0;
    border-radius: 14px;
    padding: 10px 12px;
    width: fit-content;
    max-width: 100%;
    margin-bottom: 8px;
    flex: 1;
    overflow: hidden;
  }

  .screen-dark {
    background: rgba(232,228,216,0.5);
    border-color: #c8c0a0;
    color: #7a7868;
  }

  h1 {
    font-family: 'Silkscreen', monospace;
    font-size: 1.8rem;
    color: #9090b0;
    text-align: center;
    margin-bottom: 2px;
    text-shadow: 2px 2px 0 #d0d0e0;
    letter-spacing: 2px;
  }

  .subtitle {
    font-family: 'DotGothic16', monospace;
    font-size: 2rem;
    color: #b0a890;
    text-align: center;
    margin-bottom: 22px;
    letter-spacing: 4px;
  }

  .stars-deco {
    text-align: center;
    font-size: 2rem;
    margin-bottom: 16px;
    color: #c8b8a0;
    letter-spacing: 6px;
    animation: twinkle 1.5s ease-in-out infinite alternate;
  }

  @keyframes twinkle {
    0% { opacity: 0.6; }
    100% { opacity: 1; }
  }

  /* ── Page title (editable) ── */
  .page-title {
    font-family: 'Silkscreen', monospace;
    font-size: 4rem;
    color: #9090b0;
    text-align: center;
    margin-bottom: 4px;
    text-shadow: 2px 2px 0 #d0d0e0;
    letter-spacing: 2px;
    background: none;
    border: none;
    border-bottom: 3px dashed transparent;
    outline: none;
    cursor: none !important;
    width: auto;
    width: 100%;
    word-wrap: break-word;
    overflow-wrap: break-word;
    transition: border-color 0.2s;
  }

  .page-title:hover, .page-title:focus {
    border-bottom-color: #c8c0d8;
  }

  /* ── Page tabs ── */
  .page-tabs {
    position: fixed;
    left: 0;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 10px;
    z-index: 100;
  }

  .page-tab {
    font-family: 'Silkscreen', monospace;
    font-size: 0.7rem;
    letter-spacing: 1px;
    padding: 8px 16px;
    border-radius: 0 10px 10px 0;
    border: 2px solid #c8c0a8;
    border-left: none;
    background: #ede8d4;
    color: #9890a0;
    cursor: none !important;
    transition: all 0.15s;
    position: relative;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .page-tab:hover {
    background: #f5f0e0;
    transform: translateX(-2px);
  }

  .page-tab.active {
    background: #faf6e8;
    color: #8080a8;
    border-color: #a8a0c0;
    box-shadow: 2px 0 0 #faf6e8;
    z-index: 1;
  }

  .page-tab .tab-close {
    font-size: 12px;
    opacity: 0.4;
    transition: opacity 0.15s;
  }

  .page-tab .tab-close:hover {
    opacity: 1;
  }

  .page-tab-add {
    font-family: 'Silkscreen', monospace;
    font-size: 0.85rem;
    padding: 7px 14px;
    border-radius: 0 10px 10px 0;
    border: 2px dashed #c8c0a8;
    border-left: none;
    background: transparent;
    color: #b0a890;
    cursor: none !important;
    transition: all 0.15s;
  }

  .page-tab-add:hover {
    background: #ede8d4;
    transform: translateX(-2px);
  }

  /* ── Section titles ── */
  .section-title {
    font-family: 'Silkscreen', monospace;
    font-size: 0.85rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 6px;
    padding-bottom: 4px;
    border-bottom: 2px dashed #c8c0a8;
    color: #a09880;
  }

  /* ── Main layout: sidebar left + grid right ── */
  .tracker-layout {
    display: flex;
    gap: 24px;
    align-items: flex-start;
    width: 100%;
  }

  .sidebar {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
    width: 180px;
    padding-left: 14px;
    padding-right: 16px;
  }

  .sidebar-section-title {
    font-family: 'Silkscreen', monospace;
    font-size: 0.7rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-align: center;
    padding-bottom: 4px;
    border-bottom: 2px dashed #c8c0a8;
    color: #a09880;
    opacity: 0.7;
  }

  /* ── Color Picker (vertical) ── */
  .color-options {
    display: grid;
    grid-template-columns: repeat(5, 28px);
    gap: 5px;
    justify-content: center;
  }

  .eraser-row {
    display: flex;
    justify-content: center;
    margin-bottom: 4px;
  }

  .color-btn {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 2px solid #c8c0a8;
    cursor: none !important;
    transition: all 0.15s;
  }

  .color-btn:hover {
    transform: scale(1.2);
    border-color: #a8a0c0;
    box-shadow: 0 0 6px rgba(160, 150, 190, 0.4);
  }

  .color-btn.active {
    border-color: #8880a8;
    box-shadow: 0 0 0 3px rgba(136, 128, 168, 0.3);
    transform: scale(1.15);
  }

  .color-btn.eraser {
    background: #f5f0d0 !important;
    border: 2px dashed #c8c0a8;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-family: 'Silkscreen', monospace;
    color: #a09880;
  }

  .color-btn.eraser.active {
    border-color: #8880a8;
    border-style: dashed;
    box-shadow: 0 0 0 3px rgba(136, 128, 168, 0.3);
  }

  /* ── Legend (vertical) ── */
  .legend-items {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.75rem;
    font-family: 'DotGothic16', monospace;
    color: #8a8478;
    cursor: grab !important;
    padding: 4px 6px;
    border-radius: 6px;
    transition: background 0.15s;
  }

  .legend-item:hover {
    background: rgba(0,0,0,0.04);
  }

  .legend-item.dragging {
    opacity: 0.4;
  }

  .legend-item.drag-over {
    border-top: 2px solid #a8a0c0;
  }

  .legend-dot {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    border: 2px solid rgba(0,0,0,0.08);
    flex-shrink: 0;
  }

  .legend-input-row {
    display: flex;
    flex-direction: column;
    gap: 4px;
    align-items: stretch;
  }

  .legend-input-row input {
    font-family: 'DotGothic16', monospace;
    font-size: 0.8rem;
    border: 2px solid #c8c0a8;
    border-radius: 8px;
    padding: 6px 8px;
    background: #faf6e8;
    color: #7a7868;
    outline: none;
    width: 100%;
  }

  /* ── Buttons ── */
  .btn {
    font-family: 'Silkscreen', monospace;
    font-size: 0.7rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    border: 2px solid;
    border-radius: 10px;
    padding: 8px 16px;
    cursor: none !important;
    transition: all 0.15s;
  }

  .btn:hover {
    transform: translateY(-2px);
    box-shadow: 2px 2px 0 rgba(0,0,0,0.08);
  }

  .btn:active {
    transform: translateY(0);
    box-shadow: none;
  }

  .btn-add {
    background: #d8e8c8;
    border-color: #b0c8a0;
    color: #708060;
  }

  .btn-reset {
    background: #e8d0c8;
    border-color: #c8b0a8;
    color: #907870;
  }

  /* ── Tracker Grid ── */
  .tracker-scroll {
    overflow-x: auto;
    padding-bottom: 4px;
  }

  .tracker-table {
    border-collapse: separate;
    border-spacing: 4px 2px;
    margin: 0;
  }

  .tracker-table th {
    font-family: 'Silkscreen', monospace;
    font-size: 0.6rem;
    color: #9890a0;
    padding: 0 1px 6px;
    text-align: center;
    letter-spacing: 1px;
  }

  .tracker-table th.day-header {
    padding-right: 8px;
    text-align: right;
  }

  .tracker-table td.day-label {
    text-align: right;
    padding-right: 8px;
    font-family: 'Silkscreen', monospace;
    font-size: 0.55rem;
    color: #a09880;
    white-space: nowrap;
  }

  .dot-cell { padding: 0; }

  .dot {
    width: var(--dot-size, 18px);
    height: var(--dot-size, 18px);
    border-radius: 50%;
    background: #efe8d0;
    border: 2px solid #d0c8b0;
    cursor: none !important;
    transition: all 0.15s;
  }

  .dot:hover {
    transform: scale(1.25);
    box-shadow: 0 0 8px rgba(160, 150, 190, 0.4);
    border-color: #a8a0c0;
  }

  .dot.filled {
    border-color: rgba(0, 0, 0, 0.08);
  }

  /* ── Stats ── */
  .stats-row {
    display: flex;
    gap: 20px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .stat { text-align: center; }

  .stat-value {
    font-family: 'Silkscreen', monospace;
    font-size: 2rem;
    color: #8a8478;
  }

  .stat-label {
    font-family: 'DotGothic16', monospace;
    font-size: 0.75rem;
    letter-spacing: 1px;
    color: #a8a090;
  }

  .actions {
    margin-top: 16px;
    display: flex;
    gap: 10px;
    justify-content: center;
  }

  /* ── Book style shell ── */
  .tama-shell {
    position: relative;
    background: linear-gradient(135deg, #faf5ea 0%, #f3ecdb 50%, #ede5d0 100%);
    border-radius: 4px 16px 16px 4px;
    padding: 12px 14px 10px 34px;
    width: fit-content;
    height: calc(100vh - 20px);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    box-shadow:
      /* book depth */
      -3px 0 0 #e8dcc6,
      -5px 0 0 #ddd0b8,
      /* soft outer shadow */
      2px 3px 10px rgba(0,0,0,0.08);
    border: 1px solid #d8cdb5;
  }

  /* Book spine groove */
  .tama-shell::before {
    content: '';
    position: absolute;
    left: 24px;
    top: 10px;
    bottom: 10px;
    width: 2px;
    background: linear-gradient(to bottom, transparent, #d0c4a8 15%, #c8bca0 50%, #d0c4a8 85%, transparent);
    border-radius: 1px;
  }

  /* Subtle page texture lines */
  .tama-shell::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 4px 16px 16px 4px;
    background:
      repeating-linear-gradient(
        to bottom,
        transparent,
        transparent 28px,
        rgba(200, 190, 168, 0.08) 28px,
        rgba(200, 190, 168, 0.08) 29px
      );
    pointer-events: none;
  }

  .lace-edge { display: none; }

  .tama-buttons { display: none; }


  /* ── Responsive ── */
  @media (max-width: 800px) {
    .main-layout { flex-direction: column; }
    .title-side { max-width: 100%; padding-top: 0; }
    .page-title { font-size: 2rem; }
    h1 { font-size: 1.3rem; }
    .tracker-layout { flex-direction: column; }
    .sidebar { width: 100%; flex-direction: row; flex-wrap: wrap; gap: 8px; align-items: flex-start; }
    .sidebar > * { flex: 1 1 auto; min-width: 0; }
    .tracker-table { border-spacing: 3px; }
    .dot { width: 16px; height: 16px; }
    .tama-shell { padding: 20px 12px 16px 28px; border-radius: 4px 12px 12px 4px; }
    .screen { padding: 14px 10px; }
    .color-btn { width: 22px; height: 22px; }
  }
</style>
</head>
<body>


<img id="customCursor" src="cursor.gif" alt="">

<div class="main-layout">
<div class="tama-shell">
  <div class="book-spine"></div>

  <!-- Tracker Screen: sidebar + grid -->
  <div class="screen">
    <div class="section-title">Tracker</div>
    <div class="tracker-layout">
      <div class="sidebar">
        <div class="sidebar-section-title">Couleurs</div>
        <div class="eraser-row" id="eraserRow"></div>
        <div class="color-options" id="colorPicker"></div>
        <div class="sidebar-section-title">Legende</div>
        <div class="legend-items" id="legendItems"></div>
        <div class="legend-input-row">
          <input type="text" id="newLegendLabel" placeholder="ex: 1-5 pages">
          <button class="btn btn-add" onclick="addLegend()">+ Add</button>
        </div>
      </div>
      <div class="tracker-scroll">
        <table class="tracker-table" id="trackerGrid"></table>
      </div>
    </div>
  </div>


  <!-- Tamagotchi Buttons -->
  <div class="tama-buttons">
    <div class="tama-btn"></div>
    <div class="tama-btn"></div>
    <div class="tama-btn"></div>
  </div>

</div>

<div class="page-tabs" id="pageTabs"></div>
<div class="title-side">
  <div class="page-title" id="pageTitle" contenteditable="true" spellcheck="false">Reading Tracker</div>
  <p class="subtitle">~ 2026 ~</p>
  <div class="stars-deco">&#9734; &#9734; &#9734; &#9734; &#9734;</div>
  <!-- Stats -->
  <div class="screen screen-dark">
    <div class="section-title">Stats</div>
    <div class="stats-row">
      <div class="stat">
        <div class="stat-value" id="statFilled">0</div>
        <div class="stat-label">jours remplis</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="statStreak">0</div>
        <div class="stat-label">meilleure serie</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="statPercent">0%</div>
        <div class="stat-label">de l'annee</div>
      </div>
    </div>
  </div>
  <div class="actions">
    <button class="btn btn-reset" onclick="resetAll()">Tout effacer</button>
  </div>
</div>
</div>

<script>
const MONTHS = ['J','F','M','A','M','J','J','A','S','O','N','D'];
const DAYS_IN_MONTH = [31,28,31,30,31,30,31,31,30,31,30,31];
const YEAR = 2026;
const STORE_KEY = 'trackerPages2026';

const PALETTE = [
  // Rose
  '#FFE5EC','#FFC2D1','#FF9EB8','#FF7AA0','#FF5C8A',
  // Orange
  '#FFE8D6','#FFD1B0','#FFBA8A','#FFA364','#FF8C42',
  // Jaune
  '#FFF9DB','#FFF3BF','#FFEC99','#FFE066','#FFD43B',
  // Vert
  '#E6F4EA','#C7E9C0','#A8D8A8','#7BC47F','#4CAF50',
  // Bleu
  '#E7F5FF','#D0EBFF','#A5D8FF','#74C0FC','#4DABF7',
  // Violet
  '#F3F0FF','#E5DBFF','#D0BFFF','#B197FC','#9775FA',
  // Gris
  '#F8F8F8','#DADADA','#B0B0B0','#7F7F7F','#3C3C3C',
];

let pages = [];
let currentPageId = null;
let selectedColor = PALETTE[0];

/* ── Pages persistence (server) ── */
let saveTimeout = null;

async function loadPages() {
  try {
    const res = await fetch('/api/pages');
    const data = await res.json();
    pages = Array.isArray(data) && data.length > 0 ? data : [];
  } catch {
    pages = [];
  }
  if (pages.length === 0) {
    pages.push(createPage('Reading Tracker'));
    savePages();
  }
  if (!currentPageId) currentPageId = pages[0].id;
}

function savePages() {
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(() => {
    fetch('/api/pages', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(pages),
    });
  }, 300);
}

function createPage(title) {
  return { id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6), title: title, data: {}, legends: [] };
}

function currentPage() {
  return pages.find(p => p.id === currentPageId) || pages[0];
}

/* ── Init ── */
async function init() {
  await loadPages();
  renderAll();
}

function renderAll() {
  renderTabs();
  renderTitle();
  renderPicker();
  renderGrid();
  renderLegend();
  updateStats();
}

/* ── Tabs ── */
function renderTabs() {
  const container = document.getElementById('pageTabs');
  container.innerHTML = '';
  pages.forEach(page => {
    const tab = document.createElement('button');
    tab.className = 'page-tab' + (page.id === currentPageId ? ' active' : '');
    const name = document.createElement('span');
    name.textContent = page.title;
    tab.appendChild(name);
    if (pages.length > 1) {
      const close = document.createElement('span');
      close.className = 'tab-close';
      close.textContent = 'x';
      close.onclick = (e) => { e.stopPropagation(); deletePage(page.id); };
      tab.appendChild(close);
    }
    tab.onclick = () => switchPage(page.id);
    container.appendChild(tab);
  });
  const addBtn = document.createElement('button');
  addBtn.className = 'page-tab-add';
  addBtn.textContent = '+';
  addBtn.title = 'Nouvelle page';
  addBtn.onclick = addPage;
  container.appendChild(addBtn);
}

function switchPage(id) {
  currentPageId = id;
  selectedColor = PALETTE[0];
  renderAll();
}

function addPage() {
  const title = 'Nouveau Tracker';
  const page = createPage(title);
  pages.push(page);
  currentPageId = page.id;
  savePages();
  renderAll();
  document.getElementById('pageTitle').focus();
  document.getElementById('pageTitle').select();
}

function deletePage(id) {
  if (pages.length <= 1) return;
  if (!confirm('Supprimer cette page ?')) return;
  const idx = pages.findIndex(p => p.id === id);
  pages.splice(idx, 1);
  if (currentPageId === id) {
    currentPageId = pages[Math.min(idx, pages.length - 1)].id;
  }
  savePages();
  renderAll();
}

/* ── Title ── */
function renderTitle() {
  const el = document.getElementById('pageTitle');
  el.textContent = currentPage().title;
}

document.getElementById('pageTitle').addEventListener('input', function() {
  currentPage().title = this.textContent;
  savePages();
  renderTabs();
});

/* ── Color Picker ── */
function renderPicker() {
  const eraserRow = document.getElementById('eraserRow');
  eraserRow.innerHTML = '';
  const eraser = document.createElement('button');
  eraser.className = 'color-btn eraser';
  eraser.title = 'Gomme';
  eraser.textContent = 'x';
  eraser.onclick = () => {
    selectedColor = null;
    document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
    eraser.classList.add('active');
  };
  eraserRow.appendChild(eraser);

  const container = document.getElementById('colorPicker');
  container.innerHTML = '';

  PALETTE.forEach(color => {
    const btn = document.createElement('button');
    btn.className = 'color-btn' + (color === selectedColor ? ' active' : '');
    btn.style.background = color;
    btn.onclick = () => {
      selectedColor = color;
      document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    };
    container.appendChild(btn);
  });
}

/* ── Legend ── */
let dragIdx = null;

function renderLegend() {
  const page = currentPage();
  const container = document.getElementById('legendItems');
  container.innerHTML = '';
  page.legends.forEach((item, i) => {
    const div = document.createElement('div');
    div.className = 'legend-item';
    div.draggable = true;
    div.dataset.index = i;
    div.innerHTML = '<span class="legend-dot" style="background:'+item.color+'"></span>'+item.label+
      ' <span style="cursor:pointer;opacity:0.5;font-size:12px;" onclick="removeLegend('+i+')" title="Supprimer">x</span>';

    div.addEventListener('dragstart', () => { dragIdx = i; div.classList.add('dragging'); });
    div.addEventListener('dragend', () => { dragIdx = null; div.classList.remove('dragging'); container.querySelectorAll('.legend-item').forEach(el => el.classList.remove('drag-over')); });
    div.addEventListener('dragover', (e) => { e.preventDefault(); container.querySelectorAll('.legend-item').forEach(el => el.classList.remove('drag-over')); div.classList.add('drag-over'); });
    div.addEventListener('drop', (e) => {
      e.preventDefault();
      if (dragIdx === null || dragIdx === i) return;
      const moved = page.legends.splice(dragIdx, 1)[0];
      page.legends.splice(i, 0, moved);
      savePages();
      renderLegend();
    });

    container.appendChild(div);
  });
}

function addLegend() {
  const input = document.getElementById('newLegendLabel');
  const label = input.value.trim();
  if (!label || !selectedColor) return;
  currentPage().legends.push({ color: selectedColor, label: label });
  savePages();
  renderLegend();
  input.value = '';
}

function removeLegend(i) {
  currentPage().legends.splice(i, 1);
  savePages();
  renderLegend();
}

/* ── Grid ── */
function renderGrid() {
  const page = currentPage();
  const table = document.getElementById('trackerGrid');
  table.innerHTML = '';

  const thead = document.createElement('thead');
  const headRow = document.createElement('tr');
  headRow.innerHTML = '<th class="day-header"></th>';
  MONTHS.forEach(m => { headRow.innerHTML += '<th>'+m+'</th>'; });
  thead.appendChild(headRow);
  table.appendChild(thead);

  const tbody = document.createElement('tbody');
  for (let day = 1; day <= 31; day++) {
    const row = document.createElement('tr');
    row.innerHTML = '<td class="day-label">'+day+'</td>';
    for (let month = 0; month < 12; month++) {
      const td = document.createElement('td');
      td.className = 'dot-cell';
      if (day <= DAYS_IN_MONTH[month]) {
        const dot = document.createElement('div');
        dot.className = 'dot';
        const key = month+'-'+day;
        if (page.data[key]) {
          dot.style.background = page.data[key];
          dot.classList.add('filled');
        }
        dot.onclick = () => clickDot(dot, key);
        td.appendChild(dot);
      }
      row.appendChild(td);
    }
    tbody.appendChild(row);
  }
  table.appendChild(tbody);
}

function clickDot(dot, key) {
  const page = currentPage();
  if (selectedColor === null) {
    delete page.data[key];
    dot.style.background = '#efe8d0';
    dot.classList.remove('filled');
  } else {
    page.data[key] = selectedColor;
    dot.style.background = selectedColor;
    dot.classList.add('filled');
  }
  savePages();
  updateStats();
}

/* ── Stats ── */
function updateStats() {
  const page = currentPage();
  const filled = Object.keys(page.data).length;
  document.getElementById('statFilled').textContent = filled;
  const totalDays = DAYS_IN_MONTH.reduce((a, b) => a + b, 0);
  document.getElementById('statPercent').textContent = Math.round((filled / totalDays) * 100) + '%';

  // Longest streak (best consecutive days ever on this page)
  let best = 0, cur = 0;
  for (let m = 0; m < 12; m++) {
    for (let d = 1; d <= DAYS_IN_MONTH[m]; d++) {
      if (page.data[m+'-'+d]) { cur++; if (cur > best) best = cur; }
      else { cur = 0; }
    }
  }
  document.getElementById('statStreak').textContent = best;
}

function resetAll() {
  if (!confirm('Effacer cette page ?')) return;
  currentPage().data = {};
  savePages();
  renderGrid();
  updateStats();
}

init();

function resizeDots() {
  const shell = document.querySelector('.tama-shell');
  const shellStyle = getComputedStyle(shell);
  const shellPadding = parseFloat(shellStyle.paddingTop) + parseFloat(shellStyle.paddingBottom);
  const screenEl = document.querySelector('.screen');
  const screenStyle = getComputedStyle(screenEl);
  const screenPadding = parseFloat(screenStyle.paddingTop) + parseFloat(screenStyle.paddingBottom);
  const screenBorder = parseFloat(screenStyle.borderTopWidth) + parseFloat(screenStyle.borderBottomWidth);
  const sectionTitle = 24;
  const headerRow = 20;
  const shellBorder = 2;
  const available = window.innerHeight - 20 - shellPadding - screenPadding - screenBorder - sectionTitle - headerRow - shellBorder - 8;
  const spacing = 2;
  const dotSize = Math.floor((available - 32 * spacing) / 31);
  document.documentElement.style.setProperty('--dot-size', Math.max(12, dotSize) + 'px');
}
resizeDots();
window.addEventListener('resize', resizeDots);

const cursorEl = document.getElementById('customCursor');
document.addEventListener('mousemove', e => {
  cursorEl.style.left = e.clientX + 'px';
  cursorEl.style.top = e.clientY + 'px';
});
</script>
