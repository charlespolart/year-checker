name: Deploy

on:
  push:
    branches: [master]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Backend build ──
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Build backend
        working-directory: backend
        run: |
          npm ci
          npm run build
          npm prune --omit=dev

      # ── Flutter web build ──
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build Flutter web
        working-directory: flutter_app
        run: |
          flutter pub get
          flutter build web --release

      # ── Deploy to VPS ──
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          SSH_CMD="ssh -i ~/.ssh/id_deploy $VPS_USER@$VPS_HOST"
          SCP_CMD="scp -i ~/.ssh/id_deploy"

          # Sync backend (built files + node_modules + migrations)
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_deploy" \
            backend/dist/ \
            $VPS_USER@$VPS_HOST:/root/dian-dian/backend/dist/

          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_deploy" \
            backend/node_modules/ \
            $VPS_USER@$VPS_HOST:/root/dian-dian/backend/node_modules/

          rsync -az \
            -e "ssh -i ~/.ssh/id_deploy" \
            backend/drizzle/ \
            $VPS_USER@$VPS_HOST:/root/dian-dian/backend/drizzle/

          $SCP_CMD backend/package.json $VPS_USER@$VPS_HOST:/root/dian-dian/backend/package.json
          $SCP_CMD backend/drizzle.config.ts $VPS_USER@$VPS_HOST:/root/dian-dian/backend/drizzle.config.ts

          # Sync Flutter web build
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_deploy" \
            flutter_app/build/web/ \
            $VPS_USER@$VPS_HOST:/root/dian-dian/flutter_app/build/web/

          # Run migrations + restart on server
          $SSH_CMD << 'REMOTE'
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            cd /root/dian-dian/backend
            npx drizzle-kit migrate
            sudo systemctl restart diandian
          REMOTE
